name: CI
on: push
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should-audit-gems: ${{ steps.path-filter.outputs.gemfiles }}
      should-lint-code: ${{ steps.path-filter.outputs.rubocop }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: path-filter
        with:
          filters: |
            gemfiles:
              - 'Gemfile'
              - 'Gemfile.lock'
            rubocop:
              - '**/*.rb'
              - '.rubocop.yml'
              - '.rubocop_todo.yml'
  bundler-audit:
    needs: detect-changes
    if: needs.detect-changes.outputs.should-audit-gems == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap
      - name: Run bundler-audit
        run: bundle exec bundler-audit update && bundle exec bundler-audit check
  rubocop:
    needs: detect-changes
    if: needs.detect-changes.outputs.should-lint-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap
      - name: Run rubocop
        run: bundle exec rubocop
  tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_USER_NAME: postgres
      DATABASE_PASSWORD: postgres
      RAILS_ENV: test
      AWS_ACCESS_KEY_ID: ${{ secrets.BUDOMAN_BACKEND_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BUDOMAN_BACKEND_AWS_SECRET_ACCESS_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.BUDOMAN_BACKEND_STRIPE_SECRET_KEY }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_HOST: ${{ env.DATABASE_HOST }}
          POSTGRES_PORT: 5432
          POSTGRES_USER: ${{ env.DATABASE_USER_NAME }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          RAILS_ENV: ${{ env.RAILS_ENV }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap
      - name: Setup database
        run: bundle exec rails db:create db:migrate
      - name: Run rspec
        run: bundle exec rspec
  e2e-tests:
    needs: tests
    uses: kiwi439/system-tests/.github/workflows/shop_e2e_tests.yml@develop
    with:
      budoman-backend_branch: ${{ github.ref_name }}
    secrets:
      E2E_READ_REPOSITORIES_TOKEN: ${{ secrets.E2E_READ_REPOSITORIES_TOKEN }}
      BUDOMAN_FRONTEND_AWS_ACCESS_KEY_ID: ${{ secrets.BUDOMAN_FRONTEND_AWS_ACCESS_KEY_ID }}
      BUDOMAN_FRONTEND_AWS_SECRET_ACCESS_KEY: ${{ secrets.BUDOMAN_FRONTEND_AWS_SECRET_ACCESS_KEY }}
      BUDOMAN_BACKEND_AWS_ACCESS_KEY_ID: ${{ secrets.BUDOMAN_BACKEND_AWS_ACCESS_KEY_ID }}
      BUDOMAN_BACKEND_AWS_SECRET_ACCESS_KEY: ${{ secrets.BUDOMAN_BACKEND_AWS_SECRET_ACCESS_KEY }}
      BUDOMAN_BACKEND_SIDEKIQ_PANEL_LOGIN: ${{ secrets.BUDOMAN_BACKEND_SIDEKIQ_PANEL_LOGIN }}
      BUDOMAN_BACKEND_SIDEKIQ_PANEL_PASSWORD: ${{ secrets.BUDOMAN_BACKEND_SIDEKIQ_PANEL_PASSWORD }}
  notify-deploy-doable:
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Notify deploy is doable
        uses: ./.github/actions/notify-deploy-doable
        with:
          smtp-password: ${{ secrets.SMTP_PASSWORD }}
          commit-sha: ${{ github.sha }}
          repository: ${{ github.repository }}
